<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Samarth Brain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --border:#2a2a2a;
  --border2:#333333;
  --text:#f0f0f0;
  --text2:#a0a0a0;
  --text3:#666666;
  --white:#ffffff;
  --sidebar:260px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:14px;}

/* Sidebar */
#sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.2s ease;overflow:hidden;flex-shrink:0;}
#sidebar.collapsed{width:0;border-right:none;}

.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sidebar-header h2{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;}

#new-chat-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text2);cursor:pointer;font-size:13px;transition:all 0.15s;margin:12px 16px;width:calc(100% - 32px);}
#new-chat-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--text3);}
#new-chat-btn svg{flex-shrink:0;}

#conv-list{flex:1;overflow-y:auto;padding:8px;}
#conv-list::-webkit-scrollbar{width:4px;}
#conv-list::-webkit-scrollbar-track{background:transparent;}
#conv-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.conv-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background 0.1s;}
.conv-item:hover{background:var(--bg3);}
.conv-item.active{background:var(--bg4);}
.conv-title{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.conv-item.active .conv-title{color:var(--text);}
.conv-delete{opacity:0;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;border-radius:3px;transition:opacity 0.15s;}
.conv-item:hover .conv-delete{opacity:1;}
.conv-delete:hover{color:var(--text2);}

.section-label{font-size:11px;color:var(--text3);padding:8px 10px 4px;letter-spacing:0.05em;text-transform:uppercase;}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}

/* Topbar */
#topbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
#toggle-sidebar{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:4px;display:flex;align-items:center;transition:color 0.15s;}
#toggle-sidebar:hover{color:var(--text);}
#chat-title{font-size:14px;color:var(--text2);flex:1;}

/* Chat window */
#chat-window{flex:1;overflow-y:auto;padding:24px 0;}
#chat-window::-webkit-scrollbar{width:4px;}
#chat-window::-webkit-scrollbar-track{background:transparent;}
#chat-window::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.msg-row{display:flex;padding:8px 24px;gap:12px;max-width:800px;margin:0 auto;width:100%;}
.msg-row.user{flex-direction:row-reverse;}

.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:2px;}
.msg-row.user .msg-avatar{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.msg-row.bot .msg-avatar{background:var(--white);color:var(--bg);border:1px solid var(--border2);}

.msg-bubble{max-width:680px;padding:10px 14px;border-radius:10px;line-height:1.65;font-size:14px;}
.msg-row.user .msg-bubble{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.msg-row.bot .msg-bubble{background:transparent;color:var(--text);padding-left:0;}

.msg-meta{font-size:11px;color:var(--text3);margin-top:4px;padding-left:2px;}

.typing-dots{display:flex;gap:4px;padding:6px 0;}
.typing-dots span{width:5px;height:5px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,60%,100%{opacity:0.3;}30%{opacity:1;}}

/* Empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);}
#empty-state .big{font-size:20px;color:var(--text2);font-weight:500;}
#empty-state .small{font-size:13px;}

/* Input */
#input-wrap{padding:16px 24px;border-top:1px solid var(--border);}
#input-inner{max-width:800px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;transition:border-color 0.15s;}
#input-inner:focus-within{border-color:var(--text3);}
#msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;resize:none;max-height:120px;line-height:1.5;font-family:inherit;}
#msg-input::placeholder{color:var(--text3);}
#send-btn{background:var(--white);border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s;}
#send-btn:hover{opacity:0.85;}
#send-btn:disabled{opacity:0.3;cursor:not-allowed;}
#send-btn svg{width:16px;height:16px;fill:var(--bg);}

.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:8px;}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>Samarth Brain</h2>
  </div>
  <button id="new-chat-btn" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New chat
  </button>
  <div id="conv-list"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span id="chat-title">New chat</span>
  </div>

  <div id="chat-window">
    <div id="empty-state">
      <div class="big">Ask Samarth anything</div>
      <div class="small">Powered by his real data and memories</div>
    </div>
  </div>

  <div id="input-wrap">
    <div id="input-inner">
      <textarea id="msg-input" placeholder="Message Samarth..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Responses based on Samarth's real data</div>
  </div>
</div>

<script>
const API_URL = "";

let conversations = {};
let currentId = null;
let isLoading = false;
let sidebarOpen = true;

const chatWindow = document.getElementById("chat-window");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const convList = document.getElementById("conv-list");
const chatTitle = document.getElementById("chat-title");
const sidebar = document.getElementById("sidebar");

msgInput.addEventListener("input", () => {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  sendBtn.disabled = msgInput.value.trim() === "" || isLoading;
});

msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle("collapsed", !sidebarOpen);
}

function genId() { return "c_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

function newChat() {
  currentId = genId();
  conversations[currentId] = { title: "New chat", messages: [] };
  renderSidebar();
  renderChat();
  chatTitle.textContent = "New chat";
  msgInput.focus();
}

function loadConv(id) {
  currentId = id;
  renderSidebar();
  renderChat();
  chatTitle.textContent = conversations[id].title;
}

function deleteConv(id, e) {
  e.stopPropagation();
  delete conversations[id];
  if (currentId === id) {
    const ids = Object.keys(conversations);
    if (ids.length > 0) loadConv(ids[ids.length - 1]);
    else newChat();
  } else {
    renderSidebar();
  }
}

function renderSidebar() {
  const ids = Object.keys(conversations).reverse();
  if (ids.length === 0) { convList.innerHTML = ""; return; }

  convList.innerHTML = ids.map(id => {
    const c = conversations[id];
    const active = id === currentId ? "active" : "";
    return `<div class="conv-item ${active}" onclick="loadConv('${id}')">
      <span class="conv-title">${c.title}</span>
      <button class="conv-delete" onclick="deleteConv('${id}', event)" title="Delete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }).join("");
}

function renderChat() {
  if (!currentId || !conversations[currentId]) return;
  const msgs = conversations[currentId].messages;
  const empty = document.getElementById("empty-state");

  if (msgs.length === 0) {
    chatWindow.innerHTML = '<div id="empty-state"><div class="big">Ask Samarth anything</div><div class="small">Powered by his real data and memories</div></div>';
    return;
  }

  chatWindow.innerHTML = msgs.map(m => buildBubble(m.role, m.content)).join("");
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function buildBubble(role, content, memoriesUsed) {
  const avatar = role === "user" ? "You" : "S";
  const meta = (memoriesUsed !== undefined && role === "bot") ? `<div class="msg-meta">${memoriesUsed} memories used</div>` : "";
  return `<div class="msg-row ${role}">
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${content.replace(/\n/g, "<br>")}</div>
      ${meta}
    </div>
  </div>`;
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "msg-row bot";
  div.id = "typing";
  div.innerHTML = `<div class="msg-avatar">S</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function clearEmpty() {
  const e = document.getElementById("empty-state");
  if (e) e.remove();
}

function autoTitle(text) {
  return text.slice(0, 40) + (text.length > 40 ? "..." : "");
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;

  if (!currentId) newChat();
  const conv = conversations[currentId];

  isLoading = true;
  sendBtn.disabled = true;
  msgInput.value = "";
  msgInput.style.height = "auto";

  clearEmpty();
  chatWindow.innerHTML += buildBubble("user", text);
  conv.messages.push({ role: "user", content: text });

  if (conv.title === "New chat") {
    conv.title = autoTitle(text);
    chatTitle.textContent = conv.title;
    renderSidebar();
  }

  addTyping();
  chatWindow.scrollTop = chatWindow.scrollHeight;

  try {
    const history = conv.messages.slice(-10).map(m => ({
      role: m.role === "user" ? "user" : "assistant",
      content: m.content
    }));

    const res = await fetch(`${API_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history })
    });

    const data = await res.json();
    removeTyping();

    if (data.reply) {
      conv.messages.push({ role: "bot", content: data.reply });
      chatWindow.innerHTML += buildBubble("bot", data.reply, data.memories_used);
      saveToSupabase(currentId, conv);
    } else {
      chatWindow.innerHTML += buildBubble("bot", "Something went wrong. Try again.");
    }
  } catch (err) {
    removeTyping();
    chatWindow.innerHTML += buildBubble("bot", "Cannot connect to backend. Make sure app.py is running.");
  }

  chatWindow.scrollTop = chatWindow.scrollHeight;
  isLoading = false;
  sendBtn.disabled = false;
  msgInput.focus();
}

async function saveToSupabase(id, conv) {
  try {
    await fetch(`${API_URL}/save-conversation`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, title: conv.title, messages: conv.messages })
    });
  } catch(e) {}
}

async function loadFromSupabase() {
  try {
    const res = await fetch(`${API_URL}/get-conversations`);
    const data = await res.json();
    if (data.conversations) {
      data.conversations.forEach(c => {
        conversations[c.id] = { title: c.title, messages: c.messages };
      });
      renderSidebar();
    }
  } catch(e) {}
}

newChat();
loadFromSupabase();
</script>
</body>
</html>
